<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Shadow filter for the outer garment -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    
    <!-- Left-to-right body shading to give a cylindrical 3D feel -->
    <linearGradient id="body-shading" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.10" />
      <stop offset="12%" stop-color="#000000" stop-opacity="0.03" />
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="88%" stop-color="#000000" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10" />
    </linearGradient>

    <!-- Top-to-bottom shading -->
    <linearGradient id="vertical-shading" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="15%" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="85%" stop-color="#000000" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12" />
    </linearGradient>
  </defs>

  <g filter="url(#drop-shadow)">
    <!-- Base Shirt Silhouette -->
    <path d="M 320,120 C 320,120 250,130 190,150 L 120,260 L 190,290 L 240,250 C 240,250 250,450 230,680 C 230,680 400,695 570,680 C 570,680 550,450 560,250 L 610,290 L 680,260 L 610,150 C 610,150 550,130 480,120 C 480,120 440,105 400,105 C 360,105 320,120 320,120 Z" 
          fill="#2A52BE" />

    <!-- Inside Back Neck Area (Darker to simulate depth) -->
    <path d="M 320,120 C 320,120 360,105 400,105 C 440,105 480,120 480,120 C 480,120 480,165 400,165 C 320,165 320,120 320,120 Z" 
          fill="#111111" opacity="0.25" />

    <!-- Cylindrical 3D Shading Overlay -->
    <path d="M 320,120 C 320,120 250,130 190,150 L 120,260 L 190,290 L 240,250 C 240,250 250,450 230,680 C 230,680 400,695 570,680 C 570,680 550,450 560,250 L 610,290 L 680,260 L 610,150 C 610,150 550,130 480,120 C 480,120 440,105 400,105 C 360,105 320,120 320,120 Z" 
          fill="url(#body-shading)" />

    <!-- Vertical Light Overlay -->
    <path d="M 320,120 C 320,120 250,130 190,150 L 120,260 L 190,290 L 240,250 C 240,250 250,450 230,680 C 230,680 400,695 570,680 C 570,680 550,450 560,250 L 610,290 L 680,260 L 610,150 C 610,150 550,130 480,120 C 480,120 440,105 400,105 C 360,105 320,120 320,120 Z" 
          fill="url(#vertical-shading)" />

    <!-- Collar Band Rib (Crew Neck Rim) -->
    <path d="M 320,120 C 320,120 320,165 400,165 C 480,165 480,120 480,120 C 480,120 480,175 400,175 C 320,175 320,120 320,120 Z" 
          fill="#2A52BE" />
    <!-- Collar Band Highlights and Shadows -->
    <path d="M 320,120 C 320,120 320,165 400,165 C 480,165 480,120 480,120" 
          fill="none" stroke="#000000" stroke-width="2" opacity="0.15" />
    <path d="M 320,123 C 320,123 323,168 400,168 C 477,168 480,123 480,123" 
          fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25" />

    <!-- Sleeve Seams (Left and Right Armholes) -->
    <path d="M 190,150 C 190,150 215,200 240,250" fill="none" stroke="#000000" stroke-width="1.2" opacity="0.15" stroke-dasharray="3 1" />
    <path d="M 610,150 C 610,150 585,200 560,250" fill="none" stroke="#000000" stroke-width="1.2" opacity="0.15" stroke-dasharray="3 1" />

    <!-- Left & Right Sleeve Cuff Hems -->
    <path d="M 125,257 L 185,283" fill="none" stroke="#000000" stroke-width="1" opacity="0.12" stroke-dasharray="4 2" />
    <path d="M 128,259 L 188,285" fill="none" stroke="#000000" stroke-width="1" opacity="0.10" stroke-dasharray="4 2" />
    <path d="M 675,257 L 615,283" fill="none" stroke="#000000" stroke-width="1" opacity="0.12" stroke-dasharray="4 2" />
    <path d="M 672,259 L 612,285" fill="none" stroke="#000000" stroke-width="1" opacity="0.10" stroke-dasharray="4 2" />

    <!-- Bottom Hem Stitches -->
    <path d="M 233,673 C 300,685 500,685 567,673" fill="none" stroke="#000000" stroke-width="1" opacity="0.15" stroke-dasharray="4 2" />
    <path d="M 233,677 C 300,689 500,689 567,677" fill="none" stroke="#000000" stroke-width="1" opacity="0.10" stroke-dasharray="4 2" />

    <!-- Wrinkles/Creases shading to look organic -->
    <!-- Chest crease -->
    <path d="M 290,260 Q 330,290 380,270" fill="none" stroke="#000000" stroke-width="7" stroke-linecap="round" opacity="0.08" />
    <path d="M 292,258 Q 330,288 378,268" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.14" />

    <!-- Left side crease -->
    <path d="M 235,430 Q 285,440 315,490" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" opacity="0.08" />
    <path d="M 237,428 Q 285,438 315,487" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.14" />

    <!-- Right side crease -->
    <path d="M 565,460 Q 515,480 495,540" fill="none" stroke="#000000" stroke-width="9" stroke-linecap="round" opacity="0.08" />
    <path d="M 563,458 Q 515,478 495,537" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.14" />

    <!-- Bottom crease -->
    <path d="M 330,640 Q 400,630 470,650" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" opacity="0.08" />
    <path d="M 332,638 Q 400,628 468,648" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.14" />
  </g>
</svg>